<head>

  <title>FocoPlan - Calm Productivity</title>

  <link rel="stylesheet" crossorigin href="/assets/index-UZrPQwHM.css">
</head>

<body>
  <script>
    // Anti-flicker: apply persisted theme before React mounts
    try {
      var s = JSON.parse(localStorage.getItem('focoplan-settings') || '{}');
      var t = s && s.state && s.state.appearance && s.state.appearance.theme;
      var isDark = t === 'escuro' || (t === 'automatico' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.classList.add('dark');
      }
    } catch (e) { }
  </script>
  <div id="root"></div>
</body>

</html>
