name: Deploy FocoPlan to GitHub Pages

on:
  push:
    branches:
      - main # O deploy roda quando houver um git push na branch main

# Configurar permissões para o token do GitHub (necessário para o gh-pages action)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Project (Vite)
        run: npm run build
        env:
          # Estas variáveis devem estar configuradas no seu Github: Settings -> Secrets and variables -> Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # A pasta de saída do vite após o 'npm run build'
          publish_branch: gh-pages # Vai jogar o código do dist para essa branch separada para hospedar o site!
          cname: focoplan.tech
